<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hotspot Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;margin:0;padding:24px;background:#f7f7f7}
    .card{max-width:420px;margin:0 auto;background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.08);padding:18px}
    .title{font-weight:700;margin-bottom:8px}
    .small{color:#666;font-size:.9rem}
    .note{margin-top:10px}
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Redirecting...</div>
    <div class="small">Opening portal hotspot login.</div>

    <div class="note small">
      If you are not redirected automatically, open:
      <div style="margin-top:6px;word-break:break-all">
        <a id="portalLink" href="#">Open portal</a>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var portalBase = "http://portal.example";
      var url = portalBase + "/hotspot-login.php"
        + "?mac=$(mac)"
        + "&login_url=$(link-login-only)"
        + "&dst=$(link-orig)"
        + "&popup=$(popup)"
        + "&nas_ip=$(server-address)";

      var a = document.getElementById("portalLink");
      if (a) a.href = url;
      window.location.replace(url);
    })();
  </script>
</body>
</html>
